<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Legendary Summer 2026 — checklist dobrodružství, achievementy a chat s adminem.">
  <meta name="theme-color" content="#f5a623">
  <title>☀️ Legendary Summer 2026 — Checklist &amp; Chat</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%98%80%EF%B8%8F%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --bg-1: #fff9e8;
      --bg-2: #fee6c5;
      --surface: #ffffff;
      --surface-2: #fffef5;
      --surface-3: #fff0dd;
      --border: #ffe0b3;
      --border-strong: #ffd184;
      --text: #2a241a;
      --text-soft: #8a6d44;
      --muted: #b87a3c;
      --accent: #f5a623;
      --accent-strong: #e67e22;
      --accent-contrast: #ffffff;
      --danger: #e2614a;
      --shadow: 0 6px 24px rgba(170, 110, 30, 0.12);
      --shadow-sm: 0 2px 8px rgba(170, 110, 30, 0.08);
      --radius: 18px;
      --radius-lg: 28px;
      --radius-pill: 999px;
    }
    [data-theme="dark"] {
      --bg-1: #1d1810;
      --bg-2: #14110b;
      --surface: #2a241a;
      --surface-2: #322a1d;
      --surface-3: #3b3122;
      --border: #4a3d29;
      --border-strong: #6b562f;
      --text: #f4ecdc;
      --text-soft: #cdb487;
      --muted: #d2a865;
      --accent: #f5a623;
      --accent-strong: #ffb74d;
      --accent-contrast: #1d1810;
      --danger: #ff7a63;
      --shadow: 0 6px 24px rgba(0, 0, 0, 0.45);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.35);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background: linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 100%);
      background-attachment: fixed;
      font-family: 'Segoe UI', system-ui, 'Inter', -apple-system, sans-serif;
      padding: 1rem;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.45;
      transition: background 0.3s, color 0.3s;
    }
    .container { max-width: 1300px; margin: 0 auto; }

    :focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 6px; }

    /* ---------- Top bar ---------- */
    .topbar { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 1rem; }
    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-pill);
      width: 46px; height: 46px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 1.4rem; cursor: pointer; color: var(--text);
      box-shadow: var(--shadow-sm);
      transition: transform 0.15s, background 0.2s;
    }
    .icon-btn:hover { transform: translateY(-2px); background: var(--surface-3); }
    .icon-btn:active { transform: translateY(0); }

    /* ---------- Hero ---------- */
    .hero {
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.4rem 1rem;
      margin-bottom: 1.4rem;
      box-shadow: var(--shadow);
    }
    .hero h1 {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      background: linear-gradient(125deg, var(--accent-strong), var(--accent));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      letter-spacing: 0.5px;
    }
    .counters { display: flex; justify-content: center; gap: 0.8rem; flex-wrap: wrap; margin-top: 0.9rem; }
    .counter {
      background: var(--surface-3); border-radius: var(--radius-pill);
      padding: 0.35rem 1rem; font-size: 0.82rem; font-weight: 600; color: var(--text-soft);
    }
    .counter b { color: var(--accent-strong); }

    /* ---------- Tabs ---------- */
    .tabs {
      display: flex; gap: 8px; margin-bottom: 1.2rem;
      border-bottom: 2px solid var(--border-strong); padding-bottom: 6px;
    }
    .tab-btn {
      background: var(--surface-2); border: 1px solid transparent;
      padding: 0.55rem 1.3rem; border-radius: var(--radius-pill);
      font-weight: 700; cursor: pointer; font-size: 0.9rem; color: var(--text-soft);
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn:hover { background: var(--surface-3); }
    .tab-btn.active { background: var(--accent); color: var(--accent-contrast); }
    .tab-content { display: none; animation: fade 0.25s ease; }
    .tab-content.active { display: block; }
    @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ---------- Cards ---------- */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow-sm);
      padding: 0.9rem 1rem; margin-bottom: 1.2rem;
    }
    .stats-card { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 12px; }
    .progress-text { background: var(--surface-3); padding: 0.3rem 1rem; border-radius: var(--radius-pill); font-weight: 700; font-size: 0.9rem; white-space: nowrap; }
    .progress-bar { background: var(--surface-3); border-radius: var(--radius-pill); height: 12px; flex: 2; min-width: 120px; overflow: hidden; }
    .progress-fill { background: linear-gradient(90deg, var(--accent), var(--accent-strong)); width: 0%; height: 100%; border-radius: var(--radius-pill); transition: width 0.35s ease; }

    .btn {
      background: var(--accent); color: var(--accent-contrast); border: none;
      padding: 0.5rem 1.1rem; border-radius: var(--radius-pill); cursor: pointer;
      font-weight: 700; font-size: 0.85rem; transition: filter 0.15s, transform 0.15s;
    }
    .btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-secondary { background: var(--surface-3); color: var(--text); border: 1px solid var(--border-strong); }
    .btn-danger { background: var(--danger); color: #fff; }

    .panel-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.6rem; color: var(--text); }
    .badge-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .badge { background: var(--surface-3); border-radius: var(--radius-pill); padding: 0.3rem 0.8rem; font-size: 0.74rem; font-weight: 600; }
    .badge.locked { opacity: 0.4; }
    .badge.unlocked { background: linear-gradient(120deg, #ffe9b8, #ffd27a); color: #6b4a12; }
    [data-theme="dark"] .badge.unlocked { color: #1d1810; }

    .calendar-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .cal-month-label { width: 100%; font-size: 0.72rem; color: var(--muted); font-weight: 700; margin-top: 6px; }
    .cal-day { width: 30px; height: 30px; background: var(--surface-3); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 700; color: var(--text-soft); }
    .cal-day.active { background: var(--accent); color: var(--accent-contrast); }
    .cal-day.today { box-shadow: 0 0 0 2px var(--accent-strong); }

    /* ---------- Controls (search/filter) ---------- */
    .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; }
    .search-wrap span { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); opacity: 0.6; }
    .search-wrap input { padding-left: 34px; margin: 0; }
    .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--surface-2); border: 1px solid var(--border-strong); color: var(--text-soft);
      padding: 0.4rem 0.9rem; border-radius: var(--radius-pill); font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .filter-btn.active { background: var(--accent); color: var(--accent-contrast); border-color: var(--accent); }

    /* ---------- Checklist ---------- */
    .checklist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.2rem; }
    .category-card { background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
    .category-card.is-empty { display: none; }
    .category-header { background: var(--surface-3); padding: 0.6rem 0.9rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-strong); }
    .category-header h3 { font-size: 0.95rem; }
    .cat-stats { font-size: 0.78rem; font-weight: 700; color: var(--accent-strong); background: var(--surface); padding: 0.15rem 0.6rem; border-radius: var(--radius-pill); }
    .tasks-list { padding: 0.6rem; display: flex; flex-direction: column; gap: 0.45rem; }
    .task-item { display: flex; gap: 10px; background: var(--surface-2); padding: 0.5rem 0.6rem; border-radius: 14px; border: 1px solid var(--border); align-items: flex-start; transition: border-color 0.15s, background 0.15s; }
    .task-item:hover { border-color: var(--border-strong); }
    .task-item.done { opacity: 0.62; }
    .task-item.done .task-text strong { text-decoration: line-through; text-decoration-color: var(--accent); }
    .task-item.hidden { display: none; }
    .task-checkbox { flex-shrink: 0; width: 20px; height: 20px; margin-top: 2px; accent-color: var(--accent); cursor: pointer; }
    .task-text { flex: 1; font-size: 0.84rem; line-height: 1.35; word-break: break-word; }
    .comment-icon { cursor: pointer; opacity: 0.7; font-size: 0.85rem; margin-left: 4px; background: none; border: none; color: inherit; }
    .comment-icon:hover { opacity: 1; }
    .comment-preview { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .legend-badge { background: linear-gradient(120deg, #ffd27a, #f5a623); color: #6b4a12; border-radius: var(--radius-pill); padding: 0.05rem 0.45rem; font-size: 0.6rem; font-weight: 800; margin-left: 6px; white-space: nowrap; }
    .empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; grid-column: 1 / -1; }

    /* ---------- Chat ---------- */
    .chat-settings { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .link-btn { background: none; border: none; font-size: 0.85rem; color: var(--accent-strong); cursor: pointer; text-decoration: underline; }
    .notification-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: var(--text-soft); }
    .notification-toggle input { width: auto; margin: 0; }
    .chat-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-bottom: 1rem; max-height: 520px; overflow-y: auto; box-shadow: var(--shadow-sm); }
    .chat-message { background: var(--surface-2); border-radius: 14px; padding: 0.75rem 0.85rem; margin-bottom: 0.9rem; border-left: 4px solid var(--accent); position: relative; }
    .chat-message.mine { border-left-color: var(--accent-strong); }
    .chat-name { font-weight: 700; color: var(--accent-strong); margin-right: 8px; }
    .chat-date { font-size: 0.62rem; color: var(--muted); }
    .delete-msg { position: absolute; top: 8px; right: 10px; background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; color: inherit; }
    .delete-msg:hover { opacity: 1; }
    .chat-question { margin-top: 5px; word-break: break-word; }
    .chat-question.deleted { font-style: italic; color: var(--muted); }
    .chat-answer { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed var(--border-strong); color: var(--accent-strong); font-size: 0.88rem; }
    .chat-form { display: flex; flex-direction: column; gap: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; }
    .chat-form textarea { resize: vertical; min-height: 52px; }
    .chat-status { font-size: 0.74rem; color: var(--muted); text-align: center; min-height: 1em; }

    /* ---------- Forms ---------- */
    label { display: block; font-size: 0.85rem; color: var(--text-soft); }
    input, textarea, select {
      width: 100%; border-radius: 12px; border: 1px solid var(--border-strong);
      padding: 0.55rem 0.7rem; margin: 0.4rem 0; font-size: 0.88rem;
      background: var(--surface-2); color: var(--text); font-family: inherit;
    }
    input[type="checkbox"] { width: auto; }
    input::placeholder, textarea::placeholder { color: var(--muted); opacity: 0.7; }

    /* ---------- Modal ---------- */
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); align-items: center; justify-content: center; z-index: 1000; padding: 1rem; }
    .modal.open { display: flex; }
    .modal-content { background: var(--surface); max-width: 460px; width: 100%; border-radius: var(--radius); padding: 1.3rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
    .modal-content h3 { margin-bottom: 0.6rem; }
    .modal-content hr { border: none; border-top: 1px solid var(--border); margin: 0.9rem 0; }
    .modal-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 0.8rem; }
    .switch-row { display: flex; align-items: center; gap: 10px; margin: 0.7rem 0; }

    /* ---------- Toast ---------- */
    .toast-wrap { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 8px; z-index: 1100; width: min(92vw, 380px); }
    .toast { background: var(--surface); border: 1px solid var(--border-strong); border-left: 5px solid var(--accent); border-radius: 14px; padding: 0.7rem 0.9rem; box-shadow: var(--shadow); font-size: 0.85rem; animation: toastIn 0.25s ease; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

    footer { text-align: center; margin-top: 1.8rem; font-size: 0.72rem; color: var(--muted); }

    @media (max-width: 520px) {
      body { padding: 0.7rem; }
      .checklist-grid { grid-template-columns: 1fr; }
      .tab-btn { padding: 0.5rem 1rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <button class="icon-btn" id="themeBtn" aria-label="Přepnout téma" title="Téma">🌙</button>
    <button class="icon-btn" id="settingsBtn" aria-label="Nastavení" title="Nastavení">⚙️</button>
  </div>

  <header class="hero">
    <h1>☀️ LEGENDARY SUMMER 2026 ☀️</h1>
    <div class="counters">
      <div class="counter" id="summerCounter">🌞 Léto: <b id="summerTotal">0</b> dní · zbývá <b id="summerLeft">0</b></div>
      <div class="counter" id="vacCounter">🏖️ Prázdniny: <b id="vacTotal">0</b> dní · zbývá <b id="vacLeft">0</b></div>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab-btn active" data-tab="checklist" role="tab" aria-selected="true">📋 Checklist</button>
    <button class="tab-btn" data-tab="chat" role="tab" aria-selected="false">💬 Chat s adminem</button>
  </nav>

  <section id="tab-checklist" class="tab-content active" role="tabpanel">
    <div class="card stats-card">
      <div class="progress-text" id="progressLabel">🏆 Splněno: 0/0</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <button class="btn-secondary btn" id="resetAllBtn">🌀 Reset vše</button>
    </div>

    <div class="card">
      <div class="panel-title" id="achievementsTitle">🏅 Dosažené úspěchy</div>
      <div class="badge-list" id="badgeList"></div>
    </div>

    <div class="card">
      <div class="panel-title" id="calendarTitle">📅 Aktivita (den s odškrtnutím)</div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </div>

    <div class="card controls">
      <div class="search-wrap">
        <span>🔍</span>
        <input type="search" id="searchInput" placeholder="Hledat úkol...">
      </div>
      <div class="filter-group" id="filterGroup">
        <button class="filter-btn active" data-filter="all">Vše</button>
        <button class="filter-btn" data-filter="active">Nesplněné</button>
        <button class="filter-btn" data-filter="done">Splněné</button>
      </div>
    </div>

    <div id="checklistRoot" class="checklist-grid"></div>
  </section>

  <section id="tab-chat" class="tab-content" role="tabpanel">
    <div class="chat-settings">
      <button id="changeNameBtn" class="link-btn">✏️ Změnit jméno</button>
      <label class="notification-toggle">
        <input type="checkbox" id="notificationsToggle"> 🔔 Upozornění na odpověď
      </label>
    </div>
    <div class="chat-container" id="chatMessages" aria-live="polite">
      <div class="empty-state">Načítání zpráv...</div>
    </div>
    <div class="chat-form">
      <textarea id="chatMessageInput" rows="2" placeholder="Napiš svůj dotaz nebo nápad..."></textarea>
      <button id="sendChatMsgBtn" class="btn">📤 Odeslat zprávu</button>
      <div class="chat-status" id="chatStatus"></div>
    </div>
  </section>

  <footer id="footerText">💾 vše se ukládá v prohlížeči · komentáře · chat s adminem</footer>
</div>

<!-- Settings modal -->
<div id="settingsModal" class="modal">
  <div class="modal-content">
    <h3 id="setTitle">⚙️ Nastavení</h3>
    <label for="langSelect" id="langLabel">Jazyk / Language:</label>
    <select id="langSelect">
      <option value="cs">🇨🇿 Čeština</option>
      <option value="ru">🇷🇺 Русский</option>
    </select>
    <div class="switch-row">
      <input type="checkbox" id="soundCheck">
      <label for="soundCheck" id="soundLabel">🔊 Zvuk při odškrtnutí</label>
    </div>
    <div class="switch-row">
      <input type="checkbox" id="themeCheck">
      <label for="themeCheck" id="themeLabel">🌙 Tmavý režim</label>
    </div>
    <hr>
    <div class="modal-actions">
      <button id="resetAchBtn" class="btn-secondary btn">🏅 Resetovat achievements</button>
      <button id="closeSetBtn" class="btn">Zavřít</button>
    </div>
  </div>
</div>

<!-- Comment modal -->
<div id="commentModal" class="modal">
  <div class="modal-content">
    <h3 id="commentTitle">📝 Komentář k úkolu</h3>
    <textarea id="commentText" rows="3"></textarea>
    <div class="modal-actions">
      <button id="saveCommentBtn" class="btn">Uložit</button>
      <button id="closeCommentBtn" class="btn-secondary btn">Zrušit</button>
    </div>
  </div>
</div>

<!-- Name modal -->
<div id="nameModal" class="modal">
  <div class="modal-content">
    <h3 id="nameTitle">👤 Tvé jméno v chatu</h3>
    <input type="text" id="userNameInput" placeholder="Zadej přezdívku" maxlength="40">
    <div class="modal-actions">
      <button id="saveNameBtn" class="btn">Uložit</button>
      <button id="closeNameBtn" class="btn-secondary btn">Zrušit</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

/* ---------- state ---------- */
let lang = "cs";
let theme = "light";
let checks = new Array(TASKS.length).fill(false);
let comments = {};
let achievements = [];
let activity = {};
let soundEnabled = true;
let chatInterval = null;
let currentUserId = localStorage.getItem("chat_userId") || (Math.random().toString(36).slice(2) + Date.now().toString(36));
let currentUserName = localStorage.getItem("chat_userName") || "";
let notificationsEnabled = localStorage.getItem("chat_notifications") !== "false";
let lastAnswers = {};
let filterMode = "all";
let searchTerm = "";

const $ = (id) => document.getElementById(id);
const t = () => translations[lang];

/* ---------- persistence ---------- */
function save() {
  localStorage.setItem("summer_checks", JSON.stringify(checks));
  localStorage.setItem("summer_comments", JSON.stringify(comments));
  localStorage.setItem("summer_achievements", JSON.stringify(achievements));
  localStorage.setItem("summer_activity", JSON.stringify(activity));
  localStorage.setItem("summer_lang", lang);
  localStorage.setItem("summer_theme", theme);
  localStorage.setItem("summer_sound", String(soundEnabled));
  localStorage.setItem("chat_userId", currentUserId);
  localStorage.setItem("chat_userName", currentUserName);
  localStorage.setItem("chat_notifications", String(notificationsEnabled));
}

function safeParse(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}

function loadData() {
  const c = safeParse("summer_checks", null); if (Array.isArray(c)) checks = c.slice(0, TASKS.length).concat(new Array(Math.max(0, TASKS.length - c.length)).fill(false));
  comments = safeParse("summer_comments", {}) || {};
  achievements = safeParse("summer_achievements", []) || [];
  activity = safeParse("summer_activity", {}) || {};
  const l = localStorage.getItem("summer_lang"); if (l === "cs" || l === "ru") lang = l;
  const th = localStorage.getItem("summer_theme"); if (th === "light" || th === "dark") theme = th;
  const s = localStorage.getItem("summer_sound"); if (s !== null) soundEnabled = s === "true";
  const uid = localStorage.getItem("chat_userId"); if (uid) currentUserId = uid;
  const uname = localStorage.getItem("chat_userName"); if (uname) currentUserName = uname;
  const notif = localStorage.getItem("chat_notifications"); if (notif !== null) notificationsEnabled = notif === "true";

  $("langSelect").value = lang;
  $("soundCheck").checked = soundEnabled;
  $("themeCheck").checked = theme === "dark";
  $("notificationsToggle").checked = notificationsEnabled;
}

/* ---------- theme ---------- */
function applyTheme() {
  document.documentElement.setAttribute("data-theme", theme);
  $("themeBtn").textContent = theme === "dark" ? "☀️" : "🌙";
  $("themeCheck").checked = theme === "dark";
}

/* ---------- helpers ---------- */
function escapeHtml(str) {
  return String(str == null ? "" : str).replace(/[&<>"]/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[m]));
}

function toast(message) {
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = message;
  $("toastWrap").appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; el.style.transition = "opacity .3s"; setTimeout(() => el.remove(), 300); }, 3500);
}

function fireConfetti(opts) {
  if (typeof confetti === "function") confetti(opts);
}

function playBeep() {
  if (!soundEnabled) return;
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 880; gain.gain.value = 0.1;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
    osc.stop(ctx.currentTime + 0.3);
  } catch (e) { /* no audio */ }
}

/* ---------- chat backend ---------- */
async function sendMessageToSheet(message, name, userId) {
  try {
    await fetch(SHEETS_API_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message, name, userId })
    });
    return true;
  } catch (e) { return false; }
}

async function deleteMessageFromSheet(msgId, userId) {
  try {
    await fetch(SHEETS_API_URL, {
      method: "POST", mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ action: "delete", id: msgId, userId })
    });
    return true;
  } catch (e) { return false; }
}

async function loadMessagesFromSheet() {
  try {
    const res = await fetch(SHEETS_API_URL);
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  } catch (e) { return []; }
}

/* ---------- notifications ---------- */
async function requestNotificationPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    try { await Notification.requestPermission(); } catch (e) {}
  }
}

function showNotification(title, body) {
  if (!notificationsEnabled || !("Notification" in window)) return;
  if (Notification.permission === "granted") new Notification(title, { body });
}

/* ---------- chat UI ---------- */
async function sendChatMessage() {
  const input = $("chatMessageInput");
  const msg = input.value.trim();
  if (!msg) return;
  if (!currentUserName) { showNameModal(); return; }
  const status = $("chatStatus");
  status.textContent = t().sending;
  input.value = "";
  const ok = await sendMessageToSheet(msg, currentUserName, currentUserId);
  if (ok) {
    status.textContent = t().sent;
    setTimeout(() => { status.textContent = ""; }, 2500);
    setTimeout(renderChat, 1000);
  } else {
    status.textContent = t().sendError;
    input.value = msg;
  }
}

async function deleteMessage(msgId) {
  if (confirm(t().confirmDelete)) {
    await deleteMessageFromSheet(msgId, currentUserId);
    setTimeout(renderChat, 800);
  }
}

async function renderChat() {
  const container = $("chatMessages");
  const messages = await loadMessagesFromSheet();
  if (!messages.length) {
    container.innerHTML = `<div class="empty-state">${t().noMessages}</div>`;
    return;
  }
  messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
  for (const msg of messages) {
    if (msg.userId === currentUserId && msg.answer && msg.answer !== lastAnswers[msg.id]) {
      if (lastAnswers[msg.id] !== undefined) {
        showNotification(t().newAnswer, `${msg.message} → ${msg.answer}`);
      }
      lastAnswers[msg.id] = msg.answer;
    }
  }
  container.innerHTML = messages.map(msg => {
    const isOwner = msg.userId === currentUserId;
    const displayMessage = msg.deleted ? t().deletedMsg : msg.message;
    return `
      <div class="chat-message ${isOwner ? "mine" : ""}">
        <div>
          <span class="chat-name">${escapeHtml(msg.name)}</span>
          <span class="chat-date">${msg.timestamp ? new Date(msg.timestamp).toLocaleString() : ""}</span>
          ${isOwner && !msg.deleted ? `<button class="delete-msg" data-id="${escapeHtml(msg.id)}" aria-label="Smazat">🗑️</button>` : ""}
        </div>
        <div class="chat-question ${msg.deleted ? "deleted" : ""}">${escapeHtml(displayMessage)}</div>
        <div class="chat-answer">✏️ <strong>${t().adminAnswer}</strong> ${msg.answer ? escapeHtml(msg.answer) : `<em>${t().noAnswer}</em>`}</div>
      </div>`;
  }).join("");
  container.querySelectorAll(".delete-msg").forEach(btn => {
    btn.addEventListener("click", (e) => { e.stopPropagation(); deleteMessage(btn.getAttribute("data-id")); });
  });
  container.scrollTop = container.scrollHeight;
}

/* ---------- checklist ---------- */
function recordActivity() {
  activity[new Date().toISOString().slice(0, 10)] = true;
  renderCalendar();
}

function checkAchievements() {
  const total = TASKS.length;
  const doneTotal = checks.filter(Boolean).length;
  const catDone = {};
  for (const task of TASKS) {
    if (!catDone[task.cat]) catDone[task.cat] = { total: 0, done: 0 };
    catDone[task.cat].total++;
    if (checks[task.id]) catDone[task.cat].done++;
  }
  const newA = [];
  const add = (key, cond) => { if (cond && !achievements.includes(key)) newA.push(key); };
  add("first", doneTotal >= 1);
  add("half", doneTotal >= total / 2);
  add("full", doneTotal === total);
  add("nature", catDone.nature && catDone.nature.done === catDone.nature.total);
  add("night", catDone.night && catDone.night.done === catDone.night.total);
  add("group", catDone.group && catDone.group.done === catDone.group.total);
  add("legend", TASKS.some(task => task.leg && checks[task.id]));
  for (const a of newA) {
    achievements.push(a);
    if (soundEnabled) playBeep();
    toast(`${t().achNew} <b>${t().achNames[a]}</b>`);
  }
  if (newA.length) save();
  renderAchievements();
}

function renderAchievements() {
  const all = ["first", "half", "full", "nature", "night", "group", "legend"];
  $("badgeList").innerHTML = all.map(a => {
    const unlocked = achievements.includes(a);
    return `<div class="badge ${unlocked ? "unlocked" : "locked"}">${unlocked ? "🏅" : "🔒"} ${t().achNames[a]}</div>`;
  }).join("");
}

function renderCalendar() {
  const today = new Date().toISOString().slice(0, 10);
  let html = "";
  for (let m = 5; m <= 7; m++) {
    html += `<div class="cal-month-label">${t().monthNames[m - 5]}</div>`;
    const days = new Date(2026, m + 1, 0).getDate();
    for (let d = 1; d <= days; d++) {
      const date = `2026-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
      const cls = `cal-day ${activity[date] ? "active" : ""} ${date === today ? "today" : ""}`.trim();
      html += `<div class="${cls}">${d}</div>`;
    }
  }
  $("calendarGrid").innerHTML = html;
}

function daysBetween(a, b) { return Math.ceil((b - a) / 864e5); }

function updateCounters() {
  const today = new Date();
  const june1 = new Date(2026, 5, 1), aug31 = new Date(2026, 7, 31), july1 = new Date(2026, 6, 1);
  const totalS = daysBetween(june1, aug31) + 1, leftS = Math.max(0, daysBetween(today, aug31));
  const totalV = daysBetween(july1, aug31) + 1, leftV = Math.max(0, daysBetween(today, aug31));
  $("summerCounter").innerHTML = t().summerLabel.replace("{total}", totalS).replace("{left}", leftS);
  $("vacCounter").innerHTML = t().vacLabel.replace("{total}", totalV).replace("{left}", leftV);
}

function updateProgress() {
  const done = checks.filter(Boolean).length;
  const total = TASKS.length;
  $("progressLabel").innerHTML = `${t().progress} ${done}/${total}`;
  $("progressFill").style.width = `${(done / total) * 100}%`;
}

function taskVisible(task) {
  if (filterMode === "active" && checks[task.id]) return false;
  if (filterMode === "done" && !checks[task.id]) return false;
  if (searchTerm) {
    const hay = `${task.cz} ${task.ru}`.toLowerCase();
    if (!hay.includes(searchTerm)) return false;
  }
  return true;
}

function renderChecklist() {
  const root = $("checklistRoot");
  root.innerHTML = "";
  let anyVisible = false;
  for (const cat of Object.keys(categories)) {
    const tasks = TASKS.filter(task => task.cat === cat);
    const visibleTasks = tasks.filter(taskVisible);
    const doneInCat = tasks.filter(task => checks[task.id]).length;
    const card = document.createElement("div");
    card.className = "category-card" + (visibleTasks.length ? "" : " is-empty");
    card.innerHTML = `
      <div class="category-header">
        <h3>${categories[cat][lang]}</h3>
        <div class="cat-stats">${doneInCat}/${tasks.length}</div>
      </div>
      <div class="tasks-list"></div>`;
    const listDiv = card.querySelector(".tasks-list");
    visibleTasks.forEach(task => {
      anyVisible = true;
      const checked = checks[task.id];
      const comment = comments[task.id] || "";
      const text = lang === "cs" ? task.cz : task.ru;
      const taskDiv = document.createElement("div");
      taskDiv.className = "task-item" + (checked ? " done" : "");
      taskDiv.innerHTML = `
        <input type="checkbox" class="task-checkbox" ${checked ? "checked" : ""} aria-label="${escapeHtml(text)}">
        <div class="task-text">
          <strong>${task.emoji} ${escapeHtml(text)}</strong> ${task.leg ? '<span class="legend-badge">🏅 LEGEND</span>' : ""}
          <button class="comment-icon" aria-label="Komentář">💬 ${comment ? "✏️" : ""}</button>
          ${comment ? `<div class="comment-preview">📌 ${escapeHtml(comment.slice(0, 60))}${comment.length > 60 ? "…" : ""}</div>` : ""}
        </div>`;
      taskDiv.querySelector("input").addEventListener("change", (e) => onToggleTask(task.id, e.target.checked));
      taskDiv.querySelector(".comment-icon").addEventListener("click", (e) => { e.stopPropagation(); openComment(task.id); });
      listDiv.appendChild(taskDiv);
    });
    root.appendChild(card);
  }
  if (!anyVisible) {
    root.innerHTML = `<div class="empty-state">🤷 ${lang === "cs" ? "Nic nenalezeno" : "Ничего не найдено"}</div>`;
  }
  updateProgress();
}

function onToggleTask(id, checked) {
  checks[id] = checked;
  if (checked) recordActivity();
  save();
  updateProgress();
  checkAchievements();
  renderChecklist();
  if (soundEnabled && checked) playBeep();
  if (checks.filter(Boolean).length === TASKS.length) {
    fireConfetti({ particleCount: 300, spread: 90, origin: { y: 0.6 } });
  } else if (checked) {
    fireConfetti({ particleCount: 40, spread: 55, origin: { y: 0.7 } });
  }
}

/* ---------- comment modal ---------- */
let currentTask = null;
function openComment(id) {
  currentTask = id;
  $("commentText").value = comments[id] || "";
  openModal("commentModal");
  setTimeout(() => $("commentText").focus(), 50);
}

/* ---------- modal helpers ---------- */
function openModal(id) { $(id).classList.add("open"); }
function closeModal(id) { $(id).classList.remove("open"); }

/* ---------- language ---------- */
function applyLanguage() {
  document.documentElement.lang = lang;
  $("achievementsTitle").textContent = t().achievementsTitle;
  $("calendarTitle").textContent = t().calendarTitle;
  $("footerText").textContent = t().footer;
  $("commentTitle").textContent = t().commentTitle;
  $("saveCommentBtn").textContent = t().save;
  $("closeCommentBtn").textContent = t().cancel;
  $("setTitle").textContent = t().settingsTitle;
  $("langLabel").textContent = t().langLabel;
  $("soundLabel").textContent = t().soundLabel;
  $("themeLabel").textContent = t().themeLabel;
  $("resetAchBtn").textContent = t().resetAch;
  $("closeSetBtn").textContent = t().close;
  $("resetAllBtn").textContent = t().resetBtn;
  $("chatMessageInput").placeholder = t().chatPlaceholder;
  $("sendChatMsgBtn").textContent = t().sendBtn;
  $("changeNameBtn").textContent = t().changeName;
  $("nameTitle").textContent = t().nameTitle;
  $("userNameInput").placeholder = t().namePlaceholder;
  $("searchInput").placeholder = t().searchPlaceholder;
  $("saveNameBtn").textContent = t().save;
  $("closeNameBtn").textContent = t().cancel;
  document.querySelectorAll("#filterGroup .filter-btn").forEach(btn => {
    const f = btn.getAttribute("data-filter");
    btn.textContent = f === "all" ? t().fAll : f === "active" ? t().fActive : t().fDone;
  });
  updateCounters();
  renderAchievements();
  renderCalendar();
  renderChecklist();
}

/* ---------- events ---------- */
function bindEvents() {
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab-btn").forEach(b => { b.classList.remove("active"); b.setAttribute("aria-selected", "false"); });
      btn.classList.add("active"); btn.setAttribute("aria-selected", "true");
      const tabId = btn.getAttribute("data-tab");
      document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
      $(`tab-${tabId}`).classList.add("active");
      if (chatInterval) { clearInterval(chatInterval); chatInterval = null; }
      if (tabId === "chat") {
        renderChat();
        chatInterval = setInterval(renderChat, CHAT_POLL_MS);
      }
    });
  });

  $("themeBtn").onclick = () => { theme = theme === "dark" ? "light" : "dark"; applyTheme(); save(); };
  $("themeCheck").onchange = (e) => { theme = e.target.checked ? "dark" : "light"; applyTheme(); save(); };

  $("settingsBtn").onclick = () => openModal("settingsModal");
  $("closeSetBtn").onclick = () => closeModal("settingsModal");
  $("langSelect").onchange = (e) => { lang = e.target.value; save(); applyLanguage(); };
  $("soundCheck").onchange = (e) => { soundEnabled = e.target.checked; save(); };
  $("resetAchBtn").onclick = () => { if (confirm(t().confirmResetAch)) { achievements = []; save(); renderAchievements(); } };
  $("resetAllBtn").onclick = () => { if (confirm(t().confirmReset)) { checks.fill(false); save(); renderChecklist(); checkAchievements(); } };

  $("saveCommentBtn").onclick = () => {
    if (currentTask !== null) {
      const val = $("commentText").value.trim();
      if (val) comments[currentTask] = val; else delete comments[currentTask];
      save();
      renderChecklist();
    }
    closeModal("commentModal");
  };
  $("closeCommentBtn").onclick = () => closeModal("commentModal");

  $("sendChatMsgBtn").onclick = sendChatMessage;
  $("changeNameBtn").onclick = showNameModal;
  $("saveNameBtn").onclick = saveUserName;
  $("closeNameBtn").onclick = () => closeModal("nameModal");
  $("notificationsToggle").onchange = (e) => {
    notificationsEnabled = e.target.checked;
    save();
    if (notificationsEnabled) requestNotificationPermission();
  };

  $("searchInput").addEventListener("input", (e) => { searchTerm = e.target.value.trim().toLowerCase(); renderChecklist(); });
  document.querySelectorAll("#filterGroup .filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll("#filterGroup .filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      filterMode = btn.getAttribute("data-filter");
      renderChecklist();
    });
  });

  document.querySelectorAll(".modal").forEach(modal => {
    modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("open"); });
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") document.querySelectorAll(".modal.open").forEach(m => m.classList.remove("open"));
  });
}

/* ---------- init ---------- */
function init() {
  loadData();
  bindEvents();
  applyTheme();
  applyLanguage();
  updateCounters();
  if (!currentUserName) setTimeout(showNameModal, 600);
  requestNotificationPermission();
  loadMessagesFromSheet().then(messages => {
    for (const msg of messages) {
      if (msg.userId === currentUserId && msg.answer) lastAnswers[msg.id] = msg.answer;
    }
  });
}

init();
</script>
