    try {
      await fetch(SHEETS_API_URL, {

        headers: { "Content-Type": "application/json" },

  async function loadMessagesFromSheet() {

  }

  async function sendChatMessage() {
    const msg = document.getElementById("chatMessageInput").value.trim();

      setTimeout(() => renderChat(), 1000);
    } else {

    }
  }

        <div class="chat-date">${new Date(msg.timestamp).toLocaleString()}</div>
      </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
  }

  function escapeHtml(str) {
    return str.replace(/[&<>]/g, m => m==='&'?'&amp;':m==='<'?'&lt;':'&gt;');
  }

  // ---------- CHECKLIST (KOMPLETNÍ LOGIKA) ----------
  function save() {
    localStorage.setItem("summer_checks", JSON.stringify(checks));
    localStorage.setItem("summer_comments", JSON.stringify(comments));
    localStorage.setItem("summer_achievements", JSON.stringify(achievements));
    localStorage.setItem("summer_activity", JSON.stringify(activity));
    localStorage.setItem("summer_lang", lang);
    localStorage.setItem("summer_sound", soundEnabled);
  }

  function loadData() {
    const c = localStorage.getItem("summer_checks"); if (c) checks = JSON.parse(c);
    const cm = localStorage.getItem("summer_comments"); if (cm) comments = JSON.parse(cm);
    const a = localStorage.getItem("summer_achievements"); if (a) achievements = JSON.parse(a);
    const ac = localStorage.getItem("summer_activity"); if (ac) activity = JSON.parse(ac);
    const l = localStorage.getItem("summer_lang"); if (l === "cs" || l === "ru") lang = l;
    const s = localStorage.getItem("summer_sound"); if (s !== null) soundEnabled = s === "true";
    document.getElementById("langSelect").value = lang;
    document.getElementById("soundCheck").checked = soundEnabled;
  }

  function playBeep() {
    if (!soundEnabled) return;
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
      osc.stop(ctx.currentTime + 0.3);
    } catch(e) {}
  }

  function recordActivity() {
    activity[new Date().toISOString().slice(0,10)] = true;
    save();
    renderCalendar();
  }

  function checkAchievements() {
    const total = TASKS.length;
    const doneTotal = checks.filter(v=>v).length;
    const catDone = {};
    for (let t of TASKS) {
      if (!catDone[t.cat]) catDone[t.cat] = { total:0, done:0 };
      catDone[t.cat].total++;
      if (checks[t.id]) catDone[t.cat].done++;
    }
    const newA = [];
    if (doneTotal >= 1 && !achievements.includes("first")) newA.push("first");
    if (doneTotal >= total/2 && !achievements.includes("half")) newA.push("half");
    if (doneTotal === total && !achievements.includes("full")) newA.push("full");
    if (catDone.nature && catDone.nature.done === catDone.nature.total && !achievements.includes("nature")) newA.push("nature");
    if (catDone.night && catDone.night.done === catDone.night.total && !achievements.includes("night")) newA.push("night");
    if (catDone.group && catDone.group.done === catDone.group.total && !achievements.includes("group")) newA.push("group");
    if (TASKS.some(t=>t.leg&&checks[t.id]) && !achievements.includes("legend")) newA.push("legend");
    for (let a of newA) {
      achievements.push(a);
      if (soundEnabled) playBeep();
      alert(`${translations[lang].alertNew} ${translations[lang].achNames[a]}`);
    }
    if (newA.length) save();
    renderAchievements();
  }

  function renderAchievements() {
    const all = ["first","half","full","nature","night","group","legend"];
    document.getElementById("badgeList").innerHTML = all.map(a => `<div class="badge ${achievements.includes(a)?'':'locked'}">${achievements.includes(a)?'🏅':'🔒'} ${translations[lang].achNames[a]}</div>`).join('');
  }

  function renderCalendar() {
    let html = '';
    for (let m=5; m<=7; m++) {
      const days = new Date(2026, m+1, 0).getDate();
      for (let d=1; d<=days; d++) {
        const date = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        html += `<div class="cal-day ${activity[date]?'active':''}">${d}</div>`;
      }
    }
    document.getElementById("calendarGrid").innerHTML = html;
  }

  function updateCounters() {
    const today = new Date();
    const june1 = new Date(2026,5,1), aug31 = new Date(2026,7,31), july1 = new Date(2026,6,1);
    const totalS = Math.ceil((aug31-june1)/864e5)+1, leftS = Math.max(0, Math.ceil((aug31-today)/864e5));
    const totalV = Math.ceil((aug31-july1)/864e5)+1, leftV = Math.max(0, Math.ceil((aug31-today)/864e5));
    document.getElementById("summerTotal").innerText = totalS;
    document.getElementById("summerLeft").innerText = leftS;
    document.getElementById("vacTotal").innerText = totalV;
    document.getElementById("vacLeft").innerText = leftV;
    document.getElementById("summerCounter").innerHTML = translations[lang].summerLabel.replace("{total}", totalS).replace("{left}", leftS);
    document.getElementById("vacCounter").innerHTML = translations[lang].vacLabel.replace("{total}", totalV).replace("{left}", leftV);
  }

  function updateProgress() {
    const done = checks.filter(v=>v).length;
    const total = TASKS.length;
    document.getElementById("progressLabel").innerHTML = `${translations[lang].progress} ${done}/${total}`;
    document.getElementById("progressFill").style.width = `${(done/total)*100}%`;
    if (done === total) canvasConfetti({ particleCount:200, spread:70 });
  }

  function renderChecklist() {
    const groups = new Map();
    for (let t of TASKS) {
      if (!groups.has(t.cat)) groups.set(t.cat, []);
      groups.get(t.cat).push(t);
    }
    const root = document.getElementById("checklistRoot");
    root.innerHTML = "";
    for (let [cat, tasks] of groups.entries()) {
      const catName = categories[cat][lang];
      const doneInCat = tasks.filter(t=>checks[t.id]).length;
      const card = document.createElement("div");
      card.className = "category-card";
      card.innerHTML = `
        <div class="category-header">
          <h3>${catName}</h3>
          <div class="cat-stats">${doneInCat}/${tasks.length}</div>
        </div>
        <div class="tasks-list" id="list-${cat}"></div>
      `;
      const listDiv = card.querySelector(`.tasks-list`);
      tasks.forEach(task => {
        const checked = checks[task.id];
        const comment = comments[task.id] || "";
        const text = lang === "cs" ? task.cz : task.ru;
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-item";
        taskDiv.innerHTML = `
          <input type="checkbox" class="task-checkbox" data-id="${task.id}" ${checked?"checked":""}>
          <div class="task-text">
            <strong>${task.emoji} ${text}</strong> ${task.leg?'<span class="legend-badge">🏅 LEGEND</span>':''}
            <span class="comment-icon" data-id="${task.id}">💬 ${comment?"✏️":""}</span>
            ${comment?`<div class="comment-preview">📌 ${comment.slice(0,40)}${comment.length>40?"...":""}</div>`:""}
          </div>
        `;
        const chk = taskDiv.querySelector("input");
        chk.addEventListener("change", () => {
          checks[task.id] = chk.checked;
          recordActivity();
          save();
          updateProgress();
          checkAchievements();
          renderChecklist();
          if (soundEnabled && chk.checked) playBeep();
          if (checks.filter(v=>v).length === TASKS.length) canvasConfetti({ particleCount:300 });
        });
        taskDiv.querySelector(".comment-icon").addEventListener("click", (e) => {
          e.stopPropagation();
          openComment(task.id);
        });
        listDiv.appendChild(taskDiv);
      });
      root.appendChild(card);
    }
    updateProgress();
  }

  let currentTask = null;
  function openComment(id) {
    currentTask = id;
    document.getElementById("commentText").value = comments[id] || "";
    document.getElementById("commentModal").style.display = "flex";
  }
  document.getElementById("saveCommentBtn").onclick = () => {
    if (currentTask !== null) {
      const val = document.getElementById("commentText").value.trim();
      if (val) comments[currentTask] = val;
      else delete comments[currentTask];
      save();
      renderChecklist();
    }
    document.getElementById("commentModal").style.display = "none";
  };
  document.getElementById("closeCommentBtn").onclick = () => document.getElementById("commentModal").style.display = "none";

  function applyLanguage() {
    document.getElementById("achievementsTitle").innerText = translations[lang].achievementsTitle;
    document.getElementById("calendarTitle").innerHTML = translations[lang].calendarTitle;
    document.getElementById("footerText").innerText = translations[lang].footer;
    document.getElementById("commentTitle").innerText = translations[lang].commentTitle;
    document.getElementById("saveCommentBtn").innerText = translations[lang].save;
    document.getElementById("closeCommentBtn").innerText = translations[lang].cancel;
    document.getElementById("setTitle").innerText = translations[lang].settingsTitle;
    document.getElementById("langLabel").innerText = translations[lang].langLabel;
    document.getElementById("soundLabel").innerText = translations[lang].soundLabel;
    document.getElementById("resetAchBtn").innerText = translations[lang].resetAch;
    document.getElementById("closeSetBtn").innerText = translations[lang].close;
    document.getElementById("resetAllBtn").innerText = translations[lang].resetBtn;
    document.getElementById("chatMessageInput").placeholder = translations[lang].chatPlaceholder;
    document.getElementById("sendChatMsgBtn").innerText = translations[lang].sendBtn;
    updateCounters();
    updateProgress();
    renderAchievements();
    renderChecklist();
  }

  // ---------- NAVIGACE, MODÁLY, INICIALIZACE ----------
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tabId = btn.getAttribute('data-tab');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${tabId}`).classList.add('active');
      if (tabId === 'chat') {
        renderChat();
        if (chatInterval) clearInterval(chatInterval);
        chatInterval = setInterval(renderChat, 8000);
      } else {
        if (chatInterval) clearInterval(chatInterval);
      }
    });
  });

  const setModal = document.getElementById("settingsModal");
  document.getElementById("settingsBtn").onclick = () => setModal.style.display = "flex";
  document.getElementById("closeSetBtn").onclick = () => setModal.style.display = "none";
  document.getElementById("langSelect").onchange = (e) => { lang = e.target.value; save(); applyLanguage(); };
  document.getElementById("soundCheck").onchange = (e) => { soundEnabled = e.target.checked; save(); };
  document.getElementById("resetAchBtn").onclick = () => { if(confirm(translations[lang].confirmResetAch)) { achievements = []; save(); renderAchievements(); } };
  document.getElementById("resetAllBtn").onclick = () => { if(confirm(translations[lang].confirmReset)) { checks.fill(false); save(); renderChecklist(); updateProgress(); checkAchievements(); } };
  document.getElementById("sendChatMsgBtn").onclick = sendChatMessage;

  function init() {
    loadData();
    applyLanguage();
    renderCalendar();
    updateCounters();
    renderAchievements();
  }
  init();
</script>
</body>
</html>
