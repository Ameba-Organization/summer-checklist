    }

    }

    .header-row {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-bottom: 1rem;
    }
    .icon-btn {
      background: #fff9ef;
      border: 1px solid #f3bc6e;
      border-radius: 50px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .icon-btn:hover {
      background: #ffe8cf;
      transform: scale(0.96);
    }

    .hero {
      text-align: center;
      background: #fffcf0cc;
      backdrop-filter: blur(6px);
      border-radius: 2.5rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .hero h1 {
      font-size: 1.9rem;
      background: linear-gradient(125deg, #e67e22, #f7b731);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .counters {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }
    .counter {
      background: #fff0dd;
      border-radius: 40px;
      padding: 0.2rem 1rem;
      font-size: 0.8rem;
    }

    .stats-card {
      background: white;
      border-radius: 2rem;
      padding: 0.8rem 1rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      border: 1px solid #ffdfb0;
    }
    .progress-text {
      background: #fff0dd;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .progress-bar {
      background: #ffeed9;
      border-radius: 30px;
      height: 10px;
      flex: 2;
      min-width: 100px;
    }
    .progress-fill {
      background: #f5a623;
      width: 0%;
      height: 100%;
      border-radius: 30px;
      transition: width 0.2s;
    }
    .reset-btn {
      background: #fff0dd;
      border: 1px solid #f3bc6e;
      padding: 0.3rem 0.9rem;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .achievements-panel {
      background: #fffef5;
      border-radius: 1.5rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1.2rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .badge {
      background: #ffefcf;
      border-radius: 30px;
      padding: 0.2rem 0.7rem;
      font-size: 0.7rem;
    }
    .badge.locked {
      opacity: 0.4;
    }

    .calendar-mini {
      background: #fffef5;
      border-radius: 1.5rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1.2rem;
    }
    .calendar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 6px;
    }
    .cal-day {
      width: 30px;
      height: 30px;
      background: #ffe2bc;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .cal-day.active {
      background: #f5a623;
      color: white;
    }

    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.2rem;
    }
    .category-card {
      background: white;
      border-radius: 1.2rem;
      overflow: hidden;
      border: 1px solid #ffe6bb;
    }
    .category-header {
      background: #fff0dc;
      padding: 0.5rem 0.8rem;
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #ffd184;
      font-size: 0.95rem;
    }
    .cat-stats {
      background: #fff3e0;
      border-radius: 30px;
      padding: 0.1rem 0.6rem;
      font-size: 0.7rem;
    }
    .tasks-list {
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .task-item {
      display: flex;
      gap: 8px;
      background: #fefef7;
      padding: 0.4rem 0.5rem;
      border-radius: 0.9rem;
      border: 1px solid #ffe5c2;
      align-items: flex-start;
    }
    .task-checkbox {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      margin-top: 2px;
      accent-color: #f5a623;
    }
    .task-text {
      flex: 1;
      font-size: 0.8rem;
      line-height: 1.3;
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .comment-icon {

      font-size: 0.8rem;
      margin-left: 4px;
      display: inline-block;
      flex-shrink: 0;
    }
    .comment-preview {

      margin-top: 2px;
      word-break: break-word;
    }

      border-radius: 20px;
      padding: 0.05rem 0.4rem;
      font-size: 0.6rem;
      margin-left: 6px;
      white-space: nowrap;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      max-width: 450px;
      width: 90%;
      border-radius: 1.5rem;
      padding: 1.2rem;
    }

      width: 100%;
      border-radius: 1rem;
      border: 1px solid #ffcf8a;
      padding: 0.5rem;
      margin: 0.4rem 0;
      font-size: 0.85rem;

      font-size: 0.85rem;

    }

    const res = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: "HTML" })
    });
    if (!res.ok) throw new Error();
  }

  function playBeep() {
    if (!soundEnabled) return;
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.3);
      osc.stop(ctx.currentTime + 0.3);
    } catch (e) {}
  }

  function recordActivity() {
    activity[new Date().toISOString().slice(0, 10)] = true;
    save();
    renderCalendar();
  }

  function checkAchievements() {
    const total = TASKS.length;
    const doneTotal = checks.filter(v => v).length;
    const catDone = {};
    for (let t of TASKS) {
      if (!catDone[t.cat]) catDone[t.cat] = { total: 0, done: 0 };
      catDone[t.cat].total++;
      if (checks[t.id]) catDone[t.cat].done++;
    }
    const newA = [];
    if (doneTotal >= 1 && !achievements.includes("first")) newA.push("first");
    if (doneTotal >= total / 2 && !achievements.includes("half")) newA.push("half");
    if (doneTotal === total && !achievements.includes("full")) newA.push("full");
    if (catDone.nature && catDone.nature.done === catDone.nature.total && !achievements.includes("nature")) newA.push("nature");
    if (catDone.night && catDone.night.done === catDone.night.total && !achievements.includes("night")) newA.push("night");
    if (catDone.group && catDone.group.done === catDone.group.total && !achievements.includes("group")) newA.push("group");
    if (TASKS.some(t => t.leg && checks[t.id]) && !achievements.includes("legend")) newA.push("legend");
    for (let a of newA) {
      achievements.push(a);
      if (soundEnabled) playBeep();
      alert(`${translations[lang].alertNew} ${translations[lang].achNames[a]}`);
    }
    if (newA.length) save();
    renderAchievements();
  }

  function renderAchievements() {
    const all = ["first", "half", "full", "nature", "night", "group", "legend"];
    const container = document.getElementById("badgeList");
    container.innerHTML = all.map(a => `<div class="badge ${achievements.includes(a) ? "" : "locked"}">${achievements.includes(a) ? "🏅" : "🔒"} ${translations[lang].achNames[a]}</div>`).join("");
  }

  function renderCalendar() {
    let html = "";
    for (let m = 5; m <= 7; m++) {
      const days = new Date(2026, m + 1, 0).getDate();
      for (let d = 1; d <= days; d++) {
        const date = `2026-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        html += `<div class="cal-day ${activity[date] ? "active" : ""}">${d}</div>`;
      }
    }
    document.getElementById("calendarGrid").innerHTML = html;
  }

  function updateCounters() {
    const today = new Date();
    const june1 = new Date(2026, 5, 1), aug31 = new Date(2026, 7, 31), july1 = new Date(2026, 6, 1);
    const totalSummer = Math.ceil((aug31 - june1) / 864e5) + 1, leftSummer = Math.max(0, Math.ceil((aug31 - today) / 864e5));
    const totalVac = Math.ceil((aug31 - july1) / 864e5) + 1, leftVac = Math.max(0, Math.ceil((aug31 - today) / 864e5));
    document.getElementById("summerTotal").innerText = totalSummer;
    document.getElementById("summerLeft").innerText = leftSummer;
    document.getElementById("vacTotal").innerText = totalVac;
    document.getElementById("vacLeft").innerText = leftVac;
    document.getElementById("summerCounter").innerHTML = translations[lang].summerLabel.replace("{total}", totalSummer).replace("{left}", leftSummer);
    document.getElementById("vacCounter").innerHTML = translations[lang].vacLabel.replace("{total}", totalVac).replace("{left}", leftVac);
  }

  function updateProgress() {
    const done = checks.filter(v => v).length;
    const total = TASKS.length;
    document.getElementById("progressLabel").innerHTML = `${translations[lang].progress} ${done}/${total}`;
    document.getElementById("progressFill").style.width = `${(done / total) * 100}%`;
    if (done === total) canvasConfetti({ particleCount: 200, spread: 70 });
  }

  function renderChecklist() {
    const groups = new Map();
    for (let t of TASKS) {
      if (!groups.has(t.cat)) groups.set(t.cat, []);
      groups.get(t.cat).push(t);
    }
    const root = document.getElementById("checklistRoot");
    root.innerHTML = "";
    for (let [cat, tasks] of groups.entries()) {
      const catName = categories[cat][lang];
      const doneInCat = tasks.filter(t => checks[t.id]).length;
      const card = document.createElement("div");
      card.className = "category-card";
      card.innerHTML = `
        <div class="category-header">
          <h3>${catName}</h3>
          <div class="cat-stats">${doneInCat}/${tasks.length}</div>
        </div>
        <div class="tasks-list" id="list-${cat}"></div>
      `;
      const listDiv = card.querySelector(`.tasks-list`);
      tasks.forEach(task => {
        const checked = checks[task.id];
        const comment = comments[task.id] || "";
        const text = lang === "cs" ? task.cz : task.ru;
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-item";
        taskDiv.innerHTML = `
          <input type="checkbox" class="task-checkbox" data-id="${task.id}" ${checked ? "checked" : ""}>
          <div class="task-text">
            <strong>${task.emoji} ${text}</strong> ${task.leg ? '<span class="legend-badge">🏅 LEGEND</span>' : ''}
            <span class="comment-icon" data-id="${task.id}">💬 ${comment ? "✏️" : ""}</span>
            ${comment ? `<div class="comment-preview">📌 ${comment.slice(0, 40)}${comment.length > 40 ? "..." : ""}</div>` : ""}
          </div>
        `;
        const chk = taskDiv.querySelector("input");
        chk.addEventListener("change", () => {
          checks[task.id] = chk.checked;
          recordActivity();
          save();
          updateProgress();
          checkAchievements();
          renderChecklist();
          if (soundEnabled && chk.checked) playBeep();
          if (checks.filter(v => v).length === TASKS.length) canvasConfetti({ particleCount: 300 });
        });
        taskDiv.querySelector(".comment-icon").addEventListener("click", (e) => {
          e.stopPropagation();
          openComment(task.id);
        });
        listDiv.appendChild(taskDiv);
      });
      root.appendChild(card);
    }
    updateProgress();
  }

  let currentTask = null;
  function openComment(id) {
    currentTask = id;
    document.getElementById("commentText").value = comments[id] || "";
    document.getElementById("commentModal").style.display = "flex";
  }
  document.getElementById("saveCommentBtn").onclick = () => {
    if (currentTask !== null) {
      const val = document.getElementById("commentText").value.trim();
      if (val) comments[currentTask] = val;
      else delete comments[currentTask];
      save();
      renderChecklist();
    }
    document.getElementById("commentModal").style.display = "none";
  };
  document.getElementById("closeCommentBtn").onclick = () => document.getElementById("commentModal").style.display = "none";

  function applyLanguage() {
    document.getElementById("achievementsTitle").innerText = translations[lang].achievementsTitle;
    document.getElementById("calendarTitle").innerHTML = translations[lang].calendarTitle;
    document.getElementById("footerText").innerText = translations[lang].footer;
    document.getElementById("commentTitle").innerText = translations[lang].commentTitle;
    document.getElementById("saveCommentBtn").innerText = translations[lang].save;
    document.getElementById("closeCommentBtn").innerText = translations[lang].cancel;
    document.getElementById("setTitle").innerText = translations[lang].settingsTitle;
    document.getElementById("langLabel").innerText = translations[lang].langLabel;
    document.getElementById("soundLabel").innerText = translations[lang].soundLabel;
    document.getElementById("resetAchBtn").innerText = translations[lang].resetAch;
    document.getElementById("closeSetBtn").innerText = translations[lang].close;
    document.getElementById("fbTitle").innerText = translations[lang].fbTitle;
    document.getElementById("sendFbBtn").innerText = translations[lang].send;
    document.getElementById("fbMsg").placeholder = translations[lang].fbPlaceholder;
    document.getElementById("fbName").placeholder = translations[lang].namePlaceholder;
    document.getElementById("resetAllBtn").innerText = translations[lang].resetBtn;
    updateCounters();
    updateProgress();
    renderAchievements();
    renderChecklist();
  }

  // feedback
  const fbModal = document.getElementById("feedbackModal");
  document.getElementById("feedbackBtn").onclick = () => fbModal.style.display = "flex";
  document.getElementById("closeFbBtn").onclick = () => {
    fbModal.style.display = "none";
    document.getElementById("fbStatus").innerText = "";
  };
  document.getElementById("sendFbBtn").onclick = async () => {
    const name = document.getElementById("fbName").value.trim();
    const msg = document.getElementById("fbMsg").value.trim();
    if (!msg) {
      document.getElementById("fbStatus").innerText = "✏️ Napiš zprávu.";
      return;
    }
    if (Date.now() - lastFeedback < 60000) {
      document.getElementById("fbStatus").innerText = "⏳ Jen jednou za minutu.";
      return;
    }
    document.getElementById("fbStatus").innerText = translations[lang].sending;
    try {
      await sendToTelegram(`💬 <b>Nový návrh z webu</b>\n${name ? `👤 ${name}\n` : ""}📝 ${msg}`);
      lastFeedback = Date.now();
      document.getElementById("fbStatus").innerText = translations[lang].sentOk;
      document.getElementById("fbMsg").value = "";
      document.getElementById("fbName").value = "";
      setTimeout(() => document.getElementById("fbStatus").innerText = "", 3000);
    } catch (e) {
      console.error(e);
      document.getElementById("fbStatus").innerText = translations[lang].sentError;
    }
  };

  // settings
  const setModal = document.getElementById("settingsModal");
  document.getElementById("settingsBtn").onclick = () => setModal.style.display = "flex";
  document.getElementById("closeSetBtn").onclick = () => setModal.style.display = "none";
  document.getElementById("langSelect").onchange = (e) => {
    lang = e.target.value;
    save();
    applyLanguage();
  };
  document.getElementById("soundCheck").onchange = (e) => {
    soundEnabled = e.target.checked;
    save();
  };
  document.getElementById("resetAchBtn").onclick = () => {
    if (confirm(translations[lang].confirmResetAch)) {
      achievements = [];
      save();
      renderAchievements();
    }
  };
  document.getElementById("resetAllBtn").onclick = () => {
    if (confirm(translations[lang].confirmReset)) {
      checks.fill(false);
      save();
      renderChecklist();
      updateProgress();
      checkAchievements();
    }
  };

  function init() {
    load();
    applyLanguage();
    renderCalendar();
    updateCounters();
    renderAchievements();
  }
  init();
</script>
</body>
</html>
