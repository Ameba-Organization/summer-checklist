<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #fff9e8 0%, #fee6c5 100%);
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Inter', sans-serif;
      padding: 1.5rem 1.2rem 2.5rem;
      color: #2a241a;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header-row {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 0.5rem;
    }
    .settings-icon {
      background: #fff9ef;
      border: 1px solid #f3bc6e;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .settings-icon:hover {
      transform: rotate(15deg);
      background: #fff0df;
    }

    .hero {
      text-align: center;
      margin-bottom: 2rem;
      background: rgba(255, 252, 240, 0.85);
      backdrop-filter: blur(8px);
      border-radius: 90px;
      padding: 1.5rem 1rem;
      box-shadow: 0 20px 30px rgba(0,0,0,0.1);
    }
    .hero h1 {
      font-size: 2.8rem;
      background: linear-gradient(125deg, #e67e22, #f7b731);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .counters {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 0.8rem;
      font-weight: 600;
      flex-wrap: wrap;
    }
    .counter {
      background: #fff0ddbb;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.85rem;
    }

    .stats-card {
      background: #fffef7;
      border-radius: 60px;
      padding: 0.9rem 1.8rem;
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border: 1px solid #ffdfb0;
    }
    .progress-text {
      font-weight: 700;
      background: #fff0dd;
      padding: 0.2rem 1rem;
      border-radius: 50px;
    }
    .progress-bar {
      background-color: #ffeed9;
      border-radius: 40px;
      height: 14px;
      flex: 2;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(95deg, #f5a623, #ffce70);
      width: 0%;
      height: 100%;
    }
    .reset-btn {
      background: #fffaee;
      border: 1px solid #f3bc6e;
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      font-weight: 700;
      cursor: pointer;
    }

    .achievements-panel {
      background: #fffcf0cc;
      border-radius: 2rem;
      padding: 0.8rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
    }
    .badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .badge {
      background: #ffefcf;
      border-radius: 40px;
      padding: 0.2rem 0.8rem;
      font-size: 0.75rem;
      font-weight: bold;
    }
    .badge.locked {
      opacity: 0.4;
      filter: grayscale(0.3);
    }

    .calendar-mini {
      background: #fffef5cc;
      border-radius: 1.5rem;
      padding: 0.8rem;
      margin-bottom: 1.5rem;
    }
    .calendar-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .cal-day {
      width: 32px;
      height: 32px;
      background: #ffe2bc;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .cal-day.active {
      background: #f5a623;
      color: white;
    }

    .checklist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(370px, 1fr));
      gap: 1.8rem;
    }
    .category-card {
      background: rgba(255, 255, 248, 0.96);
      border-radius: 2rem;
      overflow: hidden;
      border: 1px solid #ffe6bb;
    }
    .category-header {
      background: linear-gradient(115deg, #fff0dc, #ffe9ce);
      padding: 0.8rem 1.2rem;
      border-bottom: 3px solid #ffd184;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .cat-stats {
      font-size: 0.8rem;
      background: #fff3e0;
      border-radius: 30px;
      padding: 0.2rem 0.7rem;
    }
    .tasks-list {
      padding: 0.7rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #ffffffdd;
      padding: 0.6rem 0.8rem;
      border-radius: 1.2rem;
      border: 1px solid #ffe5c2;
    }
    .task-checkbox {
      transform: scale(1.2);
      margin-top: 2px;
      accent-color: #f5a623;
    }
    .task-text {
      flex: 1;
      font-size: 0.9rem;
    }
    .comment-icon {
      cursor: pointer;
      opacity: 0.6;
      font-size: 1rem;
      display: inline-block;
      margin-left: 6px;
    }
    .comment-preview {
      font-size: 0.7rem;
      color: #aa7733;
      margin-top: 4px;
    }
    .legend-badge {
      background: #f5c481;
      border-radius: 30px;
      padding: 0.1rem 0.5rem;
      font-size: 0.65rem;
      margin-left: 6px;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fffcf0;
      max-width: 450px;
      width: 90%;
      border-radius: 2rem;
      padding: 1.5rem;
    }
    textarea {
      width: 100%;
      border-radius: 1rem;
      border: 1px solid #ffcf8a;
      padding: 0.5rem;
      margin: 0.5rem 0;
    }
    .btn {
      background: #f5a623;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      margin-right: 8px;
    }
    footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.7rem;
    }
    select {
      background: #fff9ef;
      border: 1px solid #f3bc6e;
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
      font-size: 0.9rem;
    }
  </style>
</head>

    localStorage.setItem("summer_lang", currentLang);
    localStorage.setItem("summer_sound", soundEnabled);
  }

  function loadAll() {
    const savedChecks = localStorage.getItem("summer_checks");
    if (savedChecks) checkedState = JSON.parse(savedChecks);
    const savedComments = localStorage.getItem("summer_comments");
    if (savedComments) taskComments = JSON.parse(savedComments);
    const savedAch = localStorage.getItem("summer_achievements");
    if (savedAch) achievementsUnlocked = JSON.parse(savedAch);
    const savedAct = localStorage.getItem("summer_activity");
    if (savedAct) activityMap = JSON.parse(savedAct);
    const savedLang = localStorage.getItem("summer_lang");
    if (savedLang === "cs" || savedLang === "ru") currentLang = savedLang;
    const savedSound = localStorage.getItem("summer_sound");
    if (savedSound !== null) soundEnabled = savedSound === "true";

    document.getElementById("soundToggle").checked = soundEnabled;

  function recordActivity() {
    const today = new Date().toISOString().slice(0,10);
    activityMap[today] = true;
    saveAll();
    renderCalendar();
  }

  function playBeep() {
    if (!soundEnabled) return;
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.1;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.3);
    } catch(e) {}
  }

  function checkAchievements() {
    const total = TASKS_DATA.length;
    const completedTotal = checkedState.filter(v=>v).length;
    const catCounts = {};
    for (let task of TASKS_DATA) {
      if (!catCounts[task.cat]) catCounts[task.cat] = { total:0, done:0 };
      catCounts[task.cat].total++;
      if (checkedState[task.id]) catCounts[task.cat].done++;
    }
    const newAch = [];
    if (completedTotal >= 1 && !achievementsUnlocked.includes("first")) newAch.push("first");
    if (completedTotal >= total/2 && !achievementsUnlocked.includes("half")) newAch.push("half");
    if (completedTotal === total && !achievementsUnlocked.includes("full")) newAch.push("full");
    if (catCounts.nature && catCounts.nature.done === catCounts.nature.total && !achievementsUnlocked.includes("nature")) newAch.push("nature");
    if (catCounts.night && catCounts.night.done === catCounts.night.total && !achievementsUnlocked.includes("night")) newAch.push("night");
    if (catCounts.group && catCounts.group.done === catCounts.group.total && !achievementsUnlocked.includes("group")) newAch.push("group");
    const hasLegend = TASKS_DATA.some(t => t.legendary && checkedState[t.id]);
    if (hasLegend && !achievementsUnlocked.includes("legend")) newAch.push("legend");

    for (let ach of newAch) {
      achievementsUnlocked.push(ach);
      if (soundEnabled) playBeep();
      alert(`${translations[currentLang].alertNewAchievement} ${translations[currentLang].achievementNames[ach]}`);
    }
    if (newAch.length) saveAll();
    renderAchievements();
  }

  function renderAchievements() {
    const container = document.getElementById("badgeList");
    const allAch = ["first","half","full","nature","night","group","legend"];
    container.innerHTML = allAch.map(ach => {
      const unlocked = achievementsUnlocked.includes(ach);
      return `<div class="badge ${unlocked ? '' : 'locked'}">${unlocked ? '🏅' : '🔒'} ${translations[currentLang].achievementNames[ach]}</div>`;
    }).join('');
  }

  function renderCalendar() {
    const months = [5,6,7]; // červen, červenec, srpen 2026
    let html = '';
    for (let m of months) {
      const daysInMonth = new Date(2026, m+1, 0).getDate();
      for (let d=1; d<=daysInMonth; d++) {
        const dateStr = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const active = activityMap[dateStr] || false;
        html += `<div class="cal-day ${active ? 'active' : ''}" title="${dateStr}">${d}</div>`;
      }
    }
    document.getElementById("calendarGrid").innerHTML = html;
  }

  function updateCounters() {
    const today = new Date();
    const june1 = new Date(2026,5,1);
    const aug31 = new Date(2026,7,31);
    const july1 = new Date(2026,6,1);
    const totalSummer = Math.ceil((aug31 - june1) / (1000*60*60*24)) + 1;
    const leftSummer = Math.max(0, Math.ceil((aug31 - today) / (1000*60*60*24)));
    const totalVac = Math.ceil((aug31 - july1) / (1000*60*60*24)) + 1;
    const leftVac = Math.max(0, Math.ceil((aug31 - today) / (1000*60*60*24)));
    document.getElementById("summerTotal").innerText = totalSummer;
    document.getElementById("summerLeft").innerText = leftSummer;
    document.getElementById("vacTotal").innerText = totalVac;
    document.getElementById("vacLeft").innerText = leftVac;
    // aktualizace textů labelů podle jazyka
    document.getElementById("summerCounterLabel").innerHTML = translations[currentLang].summerLabel.replace("{total}", totalSummer).replace("{left}", leftSummer);
    document.getElementById("vacCounterLabel").innerHTML = translations[currentLang].vacLabel.replace("{total}", totalVac).replace("{left}", leftVac);
  }

  function updateProgress() {
    const completed = checkedState.filter(v=>v).length;
    completedSpan.innerText = completed;
    totalSpan.innerText = TASKS_DATA.length;
    const percent = (completed/TASKS_DATA.length)*100;
    progressFill.style.width = `${percent}%`;
    if (completed === TASKS_DATA.length && soundEnabled) canvasConfetti({particleCount:200, spread:70, origin:{y:0.6}});
    document.getElementById("progressLabel").innerHTML = `${translations[currentLang].progress} <span>${completed}</span>/<span>${TASKS_DATA.length}</span>`;
  }

  function renderChecklist() {
    const grouped = new Map();
    for (let task of TASKS_DATA) {
      if (!grouped.has(task.cat)) grouped.set(task.cat, []);
      grouped.get(task.cat).push(task);
    }
    checklistRoot.innerHTML = "";
    for (let [cat, tasks] of grouped.entries()) {
      const catName = translations[currentLang].categories[cat] || cat;
      const totalInCat = tasks.length;
      const doneInCat = tasks.filter(t => checkedState[t.id]).length;
      const card = document.createElement("div");
      card.className = "category-card";
      card.innerHTML = `
        <div class="category-header">
          <h3 style="font-size:1.3rem;">${catName}</h3>
          <div class="cat-stats">${doneInCat}/${totalInCat}</div>
        </div>
        <div class="tasks-list" id="list-${cat}"></div>
      `;
      const listDiv = card.querySelector(`.tasks-list`);
      tasks.forEach(task => {
        const checked = checkedState[task.id];
        const comment = taskComments[task.id] || "";
        const taskText = currentLang === "cs" ? task.cz : task.ru;
        const legendHtml = task.legendary ? '<span class="legend-badge">🏅 LEGEND</span>' : '';
        const taskDiv = document.createElement("div");
        taskDiv.className = "task-item";
        taskDiv.innerHTML = `
          <input type="checkbox" class="task-checkbox" data-id="${task.id}" ${checked ? "checked" : ""}>
          <div class="task-text">
            <strong>${task.emoji} ${taskText}</strong> ${legendHtml}
            <span class="comment-icon" data-id="${task.id}">💬 ${comment ? '✏️' : ''}</span>
            ${comment ? `<div class="comment-preview">📌 ${comment.slice(0,40)}${comment.length>40 ? '...' : ''}</div>` : ''}
          </div>
        `;
        const chk = taskDiv.querySelector(".task-checkbox");
        chk.addEventListener("change", (e) => {
          checkedState[task.id] = chk.checked;
          recordActivity();
          saveAll();
          updateProgress();
          checkAchievements();
          renderChecklist();
          if (soundEnabled && chk.checked) playBeep();
          if (checkedState.filter(v=>v).length === TASKS_DATA.length) canvasConfetti({particleCount:300, spread:100});
        });
        const commentIcon = taskDiv.querySelector(".comment-icon");
        commentIcon.addEventListener("click", (e) => {
          e.stopPropagation();
          openCommentModal(task.id);
        });
        listDiv.appendChild(taskDiv);
      });
      checklistRoot.appendChild(card);
    }
    updateProgress();
  }

  let currentCommentTask = null;
  function openCommentModal(taskId) {
    currentCommentTask = taskId;
    const textarea = document.getElementById("commentText");
    textarea.value = taskComments[taskId] || "";
    document.getElementById("commentModal").style.display = "flex";
  }
  document.getElementById("saveCommentBtn").onclick = () => {
    if (currentCommentTask !== null) {
      const val = document.getElementById("commentText").value.trim();
      if (val) taskComments[currentCommentTask] = val;
      else delete taskComments[currentCommentTask];
      saveAll();
      renderChecklist();
    }
    document.getElementById("commentModal").style.display = "none";
  };
  document.getElementById("closeCommentBtn").onclick = () => document.getElementById("commentModal").style.display = "none";

  function applyLanguage() {
    // aktualizace všech statických textů
    document.getElementById("achievementsTitle").innerText = translations[currentLang].achievementsTitle;
    document.getElementById("calendarTitle").innerHTML = translations[currentLang].calendarTitle;
    document.getElementById("footerText").innerText = translations[currentLang].footer;
    document.getElementById("commentModalTitle").innerText = translations[currentLang].commentModalTitle;
    document.getElementById("saveCommentBtn").innerText = translations[currentLang].save;
    document.getElementById("closeCommentBtn").innerText = translations[currentLang].cancel;
    document.getElementById("settingsTitle").innerText = translations[currentLang].settingsTitle;
    document.getElementById("langLabel").innerText = translations[currentLang].langLabel;
    document.getElementById("soundLabel").innerText = translations[currentLang].soundLabel;
    document.getElementById("resetAchievementsBtn").innerText = translations[currentLang].resetAchievements;
    document.getElementById("closeSettingsBtn").innerText = translations[currentLang].close;
    resetBtn.innerText = translations[currentLang].resetBtn;
    updateCounters();
    updateProgress();
    renderAchievements();
    renderChecklist(); // překreslí kategorie a názvy úkolů
  }

  // nastavení modálních oken
  const settingsModal = document.getElementById("settingsModal");
  document.getElementById("settingsBtn").onclick = () => settingsModal.style.display = "flex";
  document.getElementById("closeSettingsBtn").onclick = () => settingsModal.style.display = "none";
  document.getElementById("langSelect").onchange = (e) => {
    currentLang = e.target.value;
    saveAll();
    applyLanguage();
  };
  document.getElementById("soundToggle").onchange = (e) => {
    soundEnabled = e.target.checked;
    saveAll();
  };
  document.getElementById("resetAchievementsBtn").onclick = () => {
    if (confirm(translations[currentLang].confirmResetAchievements || "Resetovat achievements?")) {
      achievementsUnlocked = [];
      saveAll();
      renderAchievements();
    }
  };

  resetBtn.onclick = () => {
    if (confirm(translations[currentLang].confirmReset)) {
      checkedState.fill(false);
      saveAll();
      renderChecklist();
      updateProgress();
      checkAchievements();
    }
  };

  function init() {
    loadAll();
    applyLanguage();
    renderCalendar();
    updateCounters();
    renderAchievements();
  }
  init();
</script>
</body>
</html>
